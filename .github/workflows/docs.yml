# Docs portal → GitHub Pages (o-sdk.escrivivir.co)
# Derivado de la plantilla skill site-web (docs.yml.tpl).
# Mitigaciones: #1 CNAME en repo · #4 npm ci · #6 build = solo VitePress · #7 gap paths.
name: Docs

on:
  push:
    branches:
      - main
      - 'wp/**'
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: docs:build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install (npm ci)
        run: npm ci
      - name: Build VitePress portal
        run: npm run docs:build
      - name: Verify links (gate)
        run: node .claude/skills/site-web/scripts/verificar-sitio.mjs --dist docs/.vitepress/dist --base /
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: deploy Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
